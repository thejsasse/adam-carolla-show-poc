name: Carolla Show Data Archive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  build-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Process Podcast Data
        run: |
          # 1. Fetch the full RSS feed
          curl -L -sS 'https://rss.art19.com/adam-carolla-show' -o carolla_rss.xml
          
          # 2. Create the slim index file for Claude
          grep -E '<title>|<pubDate>' carolla_rss.xml > carolla_index.txt

          # 3. New Search Approach: Targeted 'Carolla Classics' pull
          curl -L -sS 'https://itunes.apple.com/search?term=carolla+classics&entity=podcastEpisode&attribute=titleTerm&limit=200' -o carolla_classics.json

      - name: Commit and Push to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Adding all relevant files to the commit
          git add carolla_rss.xml carolla_index.txt carolla_classics.json
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Database Sync (Classics Search): $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

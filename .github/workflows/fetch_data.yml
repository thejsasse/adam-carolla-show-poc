name: Carolla Show Data Archive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write  # Crucial fix for Exit Code 128

jobs:
  build-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch and Process Podcast Data
        run: |
          # Fetch the full RSS feed
          curl -L -sS 'https://rss.art19.com/adam-carolla-show' -o carolla_rss.xml
          
          # Create the slim index file for Claude
          grep -E '<title>|<pubDate>' carolla_rss.xml > carolla_index.txt

      - name: Commit and Push to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add carolla_rss.xml carolla_index.txt
          git commit -m "Database Sync: $(date +'%Y-%m-%d %H:%M')" || echo "No changes detected"
          git push
